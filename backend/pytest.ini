[pytest]
# Only collect the real test suite. Without this, pytest also picks up
# backend/seed_load_test.py — a load-generation SCRIPT whose name happens to
# match the *_test.py pattern — which imports the DB at module load and trips
# the fail-closed non-test-DB guard. Scoping to tests/ keeps collection clean
# whether you run from backend/ or the repo root.
testpaths = tests

filterwarnings =
    ignore::DeprecationWarning
    ignore::UserWarning
    ignore::PendingDeprecationWarning
