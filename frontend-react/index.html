<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>BizAssist</title>

    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="BizAssist" />
    <meta name="theme-color" content="#c15f3c" />
    <script>
      (function () {
        // Prevent layout flicker on load
        const path = window.location.pathname;
        let name = 'ai';
        if (path.startsWith('/dashboard')) name = 'dashboard';
        else if (path.startsWith('/invoices')) name = 'invoices';
        else if (path.startsWith('/payments')) name = 'payments';
        else if (path.startsWith('/clients')) name = 'clients';
        else if (path.startsWith('/database')) name = 'database';
        else if (path.startsWith('/upload')) name = 'uploads';
        document.documentElement.setAttribute('data-active', name);

        // Prevent theme flicker on load
        let savedTheme = null;
        try { savedTheme = localStorage.getItem('theme'); } catch(e) {}
        if (!savedTheme) savedTheme = 'system';
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        if (savedTheme === 'dark' || (savedTheme === 'system' && prefersDark)) {
          document.documentElement.classList.add('dark-mode');
        } else {
          document.documentElement.classList.remove('dark-mode');
        }
      })();
    </script>
    <style>
      /* Prevent initial blank page white flash in dark mode */
      html, body {
        background-color: #fdfdfc;
        color: #000000;
      }
      html.dark-mode, html.dark-mode body {
        background-color: #1F1F1E;
        color: #ede8e0;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Kill any previously-registered service worker. An old SW was caching API
      // responses (/chat/history, /chat/sessions) in 'bizassist-v1' and replaying
      // STALE data — so new messages vanished, deletes didn't reflect, and the app
      // looked disconnected from the backend. A registered SW persists until it is
      // explicitly unregistered, so removing its registration alone wasn't enough.
      (function () {
        if (!('serviceWorker' in navigator)) return;
        navigator.serviceWorker.getRegistrations().then(function (regs) {
          var hadSW = regs.length > 0;
          regs.forEach(function (r) { r.unregister(); });
          if (window.caches && caches.keys) {
            caches.keys().then(function (keys) {
              return Promise.all(keys.map(function (k) { return caches.delete(k); }));
            }).then(function () {
              // One reload after the SW is gone gives a clean, network-served page.
              if (hadSW) window.location.reload();
            });
          } else if (hadSW) {
            window.location.reload();
          }
        }).catch(function () {});
      })();
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
