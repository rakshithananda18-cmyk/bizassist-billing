name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: pass
          POSTGRES_DB: rls_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run SQLite Logic Tests
        env:
          JWT_SECRET: dev-test-secret-please-change-0123456789abcdef
          GROQ_API_KEY: mock_groq_api_key
        run: |
          cd backend
          python -m pytest -q --ignore=tests/test_rls_postgres.py

      - name: Run Postgres RLS Tests
        env:
          TEST_PG_URL: postgresql://postgres:pass@localhost:5432/rls_test
          JWT_SECRET: dev-test-secret-please-change-0123456789abcdef
          GROQ_API_KEY: mock_groq_api_key
        run: |
          cd backend
          python -m pytest tests/test_rls_postgres.py -v

  frontend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            frontend-billing/package-lock.json
            frontend-ai/package-lock.json

      - name: Test frontend-billing
        run: |
          cd frontend-billing
          npm ci
          npm test

      - name: Test frontend-ai
        run: |
          cd frontend-ai
          npm ci
          npm test

  e2e-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Start Backend Server
        env:
          JWT_SECRET: dev-test-secret-please-change-0123456789abcdef
          GROQ_API_KEY: mock_groq_api_key
          DATABASE_URL: sqlite:///./test_bizassist.db
          ALLOW_TEST_USERS: '1'
        run: |
          cd backend
          python -m uvicorn main_groq:app --host 127.0.0.1 --port 8001 &
          
          # Wait for backend to be ready
          for i in {1..30}; do
            if curl -s http://127.0.0.1:8001/health; then
              echo "Backend is up and running!"
              break
            fi
            echo "Waiting for backend..."
            sleep 1
          done

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend-billing/package-lock.json

      - name: Install Playwright and browser
        run: |
          cd frontend-billing
          npm ci
          npx playwright install chromium --with-deps

      - name: Run Playwright E2E tests
        env:
          E2E_BASE_URL: http://localhost:5174
        run: |
          cd frontend-billing
          npm run e2e
