# ============================================================================
# release.yml — build & publish BizAssist desktop installers to GitHub Releases
#
# Trigger:   git tag v1.2.3 && git push origin v1.2.3
# Publishes: BizAssist-Setup-1.2.3.exe (Win), BizAssist-1.2.3-{x64,arm64}.dmg
#            + latest.yml / latest-mac.yml  (consumed by electron-updater)
#
# electron-builder publishes as a DRAFT-less release automatically using the
# built-in GITHUB_TOKEN — no extra secrets needed while the repo is public.
# ============================================================================
name: Release Desktop App

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write # create releases + upload assets

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            builder_args: --win
          - os: macos-latest
            builder_args: --mac

    runs-on: ${{ matrix.os }}
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      # ── 1. Backend → PyInstaller onedir bundle ──────────────────────────
      - name: Install backend deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Compile backend (PyInstaller)
        working-directory: backend
        run: pyinstaller bizassist-backend.spec --noconfirm

      - name: Stage backend into desktop resources
        shell: bash
        run: |
          mkdir -p desktop/resources
          cp -R backend/dist/bizassist-backend desktop/resources/backend

      # T3.3 guard: the desktop bundle must NEVER ship a .env (AI keys,
      # JWT_SECRET). CI checkouts can't contain one (.env is gitignored), but
      # this keeps local/laptop builds honest too and fails loudly on regress.
      - name: Assert no .env in packaged backend
        shell: bash
        run: |
          FILES=$(find desktop/resources/backend -name ".env*" -not -name "*.example")
          if [ -n "$FILES" ]; then
            echo "::error::.env file(s) found inside the packaged backend — secrets must not ship in the installer:"
            echo "$FILES" >&2
            exit 1
          fi
          echo "OK: no .env in the desktop backend bundle"

      # Boot the frozen exe with a CLEAN env (no .env, no secrets) exactly like
      # a fresh user install — catches import-time crashes (JWT_SECRET,
      # GROQ_API_KEY, ...) that dev machines mask because their .env exists.
      - name: Smoke test packaged backend
        shell: bash
        env:
          BIZASSIST_DATA_DIR: ${{ runner.temp }}/bizassist-smoke
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            EXE=desktop/resources/backend/bizassist-backend.exe
          else
            EXE=desktop/resources/backend/bizassist-backend
          fi
          "$EXE" --host 127.0.0.1 --port 8009 &
          PID=$!
          for i in $(seq 1 60); do
            sleep 2
            if curl -sf http://127.0.0.1:8009/health > /tmp/health.json; then
              echo "Backend healthy:"; cat /tmp/health.json
              kill $PID || true
              exit 0
            fi
            # Fail fast if the process already died (import-time crash)
            kill -0 $PID 2>/dev/null || { echo "::error::Packaged backend crashed on boot"; exit 1; }
          done
          echo "::error::Packaged backend never became healthy within 120s"
          kill $PID || true
          exit 1

      # ── 2. Frontends → Vite builds ──────────────────────────────────────
      - name: Build frontend-billing
        working-directory: frontend-billing
        run: |
          npm ci
          npm run build

      - name: Build frontend-ai
        working-directory: frontend-ai
        run: |
          npm ci
          npm run build

      # ── 3. Desktop shell → installers → GitHub Release ──────────────────
      - name: Install desktop deps
        working-directory: desktop
        run: npm ci

      - name: Sync app version with tag
        working-directory: desktop
        shell: bash
        # --allow-same-version: tagging v1.0.0 while package.json is already
        # 1.0.0 must not fail the build ("npm error Version not changed").
        run: npm version --no-git-tag-version --allow-same-version "${GITHUB_REF_NAME#v}"

      - name: Stage renderer dists
        working-directory: desktop
        run: node scripts/prepare-renderer.js

      - name: Build & publish installers
        working-directory: desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS code-signing (optional — unsigned builds still work, users
          # right-click→Open once). Uncomment when you have certs:
          # CSC_LINK: ${{ secrets.MAC_CERT_P12_BASE64 }}
          # CSC_KEY_PASSWORD: ${{ secrets.MAC_CERT_PASSWORD }}
        run: npx electron-builder ${{ matrix.builder_args }} --publish always

      - name: Upload build artifacts (debug aid)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: release-debug-${{ matrix.os }}
          path: desktop/release/*.yml
          if-no-files-found: ignore
