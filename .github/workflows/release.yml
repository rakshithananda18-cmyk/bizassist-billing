# ============================================================================
# release.yml — build & publish BizAssist desktop installers to GitHub Releases
#
# Trigger:   git tag v1.2.3 && git push origin v1.2.3
# Publishes: BizAssist-Setup-1.2.3.exe (Win), BizAssist-1.2.3-{x64,arm64}.dmg
#            + latest.yml / latest-mac.yml  (consumed by electron-updater)
#
# electron-builder publishes as a DRAFT-less release automatically using the
# built-in GITHUB_TOKEN — no extra secrets needed while the repo is public.
# ============================================================================
name: Release Desktop App

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write # create releases + upload assets

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            builder_args: --win
          - os: macos-latest
            builder_args: --mac

    runs-on: ${{ matrix.os }}
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      # ── 1. Backend → PyInstaller onedir bundle ──────────────────────────
      - name: Install backend deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Compile backend (PyInstaller)
        working-directory: backend
        run: pyinstaller bizassist-backend.spec --noconfirm

      - name: Stage backend into desktop resources
        shell: bash
        run: |
          mkdir -p desktop/resources
          cp -R backend/dist/bizassist-backend desktop/resources/backend

      # ── 2. Frontends → Vite builds ──────────────────────────────────────
      - name: Build frontend-billing
        working-directory: frontend-billing
        run: |
          npm ci
          npm run build

      - name: Build frontend-ai
        working-directory: frontend-ai
        run: |
          npm ci
          npm run build

      # ── 3. Desktop shell → installers → GitHub Release ──────────────────
      - name: Install desktop deps
        working-directory: desktop
        run: npm ci

      - name: Sync app version with tag
        working-directory: desktop
        shell: bash
        run: npm version --no-git-tag-version "${GITHUB_REF_NAME#v}"

      - name: Stage renderer dists
        working-directory: desktop
        run: node scripts/prepare-renderer.js

      - name: Build & publish installers
        working-directory: desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS code-signing (optional — unsigned builds still work, users
          # right-click→Open once). Uncomment when you have certs:
          # CSC_LINK: ${{ secrets.MAC_CERT_P12_BASE64 }}
          # CSC_KEY_PASSWORD: ${{ secrets.MAC_CERT_PASSWORD }}
        run: npx electron-builder ${{ matrix.builder_args }} --publish always

      - name: Upload build artifacts (debug aid)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: release-debug-${{ matrix.os }}
          path: desktop/release/*.yml
          if-no-files-found: ignore
