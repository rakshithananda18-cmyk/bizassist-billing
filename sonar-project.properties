sonar.organization=rakshithananda18-cmyk
sonar.projectKey=rakshithananda18-cmyk_bizassist-billing
sonar.projectName=bizassist-billing
sonar.projectVersion=1.0

# Path to sources
sonar.sources=backend,frontend-billing/src

# Exclude node_modules, tests, and build artifacts from sources
sonar.exclusions=**/node_modules/**,**/dist/**,**/build/**,**/*.test.js,**/*.test.jsx,backend/tests/**,backend/venv/**

# Path to tests
sonar.tests=backend/tests,frontend-billing/src/__tests__
sonar.test.inclusions=**/*.test.js,**/*.test.jsx,backend/tests/**

# Coverage reports
sonar.python.coverage.reportPaths=backend/coverage.xml
sonar.javascript.lcov.reportPaths=frontend-billing/coverage/lcov.info
